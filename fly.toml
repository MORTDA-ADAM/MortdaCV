app = "mortda-cv"
primary_region = "jnb"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DATA_DIR = "/data"

[[mounts]]
  source = "cv_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
